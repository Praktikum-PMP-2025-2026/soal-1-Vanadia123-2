name: Autograding Tests

on:
  - push
  - repository_dispatch

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Case 01 - contoh resmi
        id: case-01
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 01 - contoh resmi
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "4 Alya 101 PAGI 80 Bima 102 SIANG 92 Cika 103 PAGI 88 Doni 104 MALAM 70"
          expected-output: |-
            PAGI Cika 103 88
            SIANG Bima 102 92
            MALAM Doni 104 70
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 02 - hanya satu shift
        id: case-02
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 02 - hanya satu shift
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "2 Andi 10 PAGI 70 Budi 11 PAGI 80"
          expected-output: |-
            PAGI Budi 11 80
            SIANG -
            MALAM -
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 03 - tie skor pilih ID lebih kecil
        id: case-03
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 03 - tie skor pilih ID lebih kecil
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "3 Zaki 20 PAGI 90 Arga 15 PAGI 90 Cici 30 SIANG 50"
          expected-output: |-
            PAGI Arga 15 90
            SIANG Cici 30 50
            MALAM -
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 04 - tie skor dan ID pilih nama alfabetis
        id: case-04
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 04 - tie skor dan ID pilih nama alfabetis
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "3 Zeta 10 SIANG 88 Alpha 10 SIANG 88 Bima 20 MALAM 70"
          expected-output: |-
            PAGI -
            SIANG Alpha 10 88
            MALAM Bima 20 70
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 05 - semua shift terisi
        id: case-05
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 05 - semua shift terisi
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "6 A 1 PAGI 60 B 2 PAGI 90 C 3 SIANG 70 D 4 SIANG 65 E 5 MALAM 80 F 6 MALAM 85"
          expected-output: |-
            PAGI B 2 90
            SIANG C 3 70
            MALAM F 6 85
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 06 - N satu
        id: case-06
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 06 - N satu
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "1 Nara 99 MALAM 100"
          expected-output: |-
            PAGI -
            SIANG -
            MALAM Nara 99 100
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 07 - banyak kandidat per shift
        id: case-07
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 07 - banyak kandidat per shift
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "8 P1 10 PAGI 40 P2 11 PAGI 50 S1 20 SIANG 30 S2 21 SIANG 90 S3 22 SIANG 85 M1 30 MALAM 70 M2 29 MALAM 70 M3 28 MALAM 60"
          expected-output: |-
            PAGI P2 11 50
            SIANG S2 21 90
            MALAM M2 29 70
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 08 - tie kompleks di malam
        id: case-08
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 08 - tie kompleks di malam
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "4 Xeno 100 MALAM 77 Alpha 100 MALAM 77 Beta 99 MALAM 77 Dodi 10 PAGI 1"
          expected-output: |-
            PAGI Dodi 10 1
            SIANG -
            MALAM Beta 99 77
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 09 - semua kosong kecuali siang
        id: case-09
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 09 - semua kosong kecuali siang
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "3 Lina 7 SIANG 55 Dira 3 SIANG 55 Caca 4 SIANG 55"
          expected-output: |-
            PAGI -
            SIANG Dira 3 55
            MALAM -
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 10 - skor negatif atau nol tidak disebut, pakai nol
        id: case-10
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 10 - skor nol
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "3 R1 1 PAGI 0 R2 2 SIANG 0 R3 3 MALAM 0"
          expected-output: |-
            PAGI R1 1 0
            SIANG R2 2 0
            MALAM R3 3 0
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          CASE-01_RESULTS: "${{steps.case-01.outputs.result}}"
          CASE-02_RESULTS: "${{steps.case-02.outputs.result}}"
          CASE-03_RESULTS: "${{steps.case-03.outputs.result}}"
          CASE-04_RESULTS: "${{steps.case-04.outputs.result}}"
          CASE-05_RESULTS: "${{steps.case-05.outputs.result}}"
          CASE-06_RESULTS: "${{steps.case-06.outputs.result}}"
          CASE-07_RESULTS: "${{steps.case-07.outputs.result}}"
          CASE-08_RESULTS: "${{steps.case-08.outputs.result}}"
          CASE-09_RESULTS: "${{steps.case-09.outputs.result}}"
          CASE-10_RESULTS: "${{steps.case-10.outputs.result}}"
        with:
          runners: case-01,case-02,case-03,case-04,case-05,case-06,case-07,case-08,case-09,case-10
